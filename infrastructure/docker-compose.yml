services:

  postgres:
    image: postgres:17
    container_name: banking-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: banking_core
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: postgres -c wal_level=logical -c max_replication_slots=10 -c max_wal_senders=10

  mongo:
    image: mongo:8
    container_name: banking-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    entrypoint:
      - /bin/bash
      - -c
      - |
        openssl rand -base64 756 > /data/db/keyfile
        chmod 400 /data/db/keyfile
        chown 999:999 /data/db/keyfile
        exec docker-entrypoint.sh --replSet rs0 --bind_ip_all --keyFile /data/db/keyfile

  mongo-init:
    image: mongo:8
    container_name: banking-mongo-init
    depends_on:
      - mongo
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "Waiting for MongoDB to become ready..."
        for i in {1..30}; do
          if mongosh --host mongo --port 27017 -u admin -p admin --authenticationDatabase admin --eval "db.adminCommand('ping')" &>/dev/null; then
            echo "MongoDB is ready. Initiating replica set..."
            mongosh --host mongo --port 27017 -u admin -p admin --authenticationDatabase admin --eval "try { rs.status() } catch(e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] }) }"
            exit 0
          fi
          echo "MongoDB not ready yet, retrying in 2 seconds..."
          sleep 2
        done
        echo "MongoDB failed to start in time."
        exit 1

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: banking-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: '4L62StM4Txyi1uv2I88A1g'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OPTS: "-Xms128m -Xmx256m"

  connect:
    build:
      context: ./connect
      dockerfile: Dockerfile
    container_name: banking-connect
    ports:
      - "8083:8083"
    depends_on:
      - kafka
      - postgres
      - mongo
      - minio
    environment:
      CONNECT_BOOTSTRAP_SERVERS: 'kafka:29092'
      CONNECT_REST_ADVERTISED_HOST_NAME: connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: compose-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: docker-connect-configs
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_TOPIC: docker-connect-offsets
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_TOPIC: docker-connect-status
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: 'false'
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: 'false'
      CONNECT_INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
      KAFKA_OPTS: "-Xms256M -Xmx512M"

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: banking-clickhouse
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=admin
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  minio:
    image: minio/minio:latest
    container_name: banking-minio
    ports:
      - "9005:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc:latest
    container_name: banking-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set myminio http://minio:9000 minio_admin minio_password; do
        echo 'Waiting for MinIO...';
        sleep 1;
      done;
      mc mb --ignore-existing myminio/banking-lakehouse;
      echo 'Bucket banking-lakehouse created successfully!';
      exit 0;
      "

  spark:
    image: apache/spark:3.5.1
    container_name: banking-spark
    user: root
    environment:
      - SPARK_MODE=local
      - SPARK_DRIVER_MEMORY=512m
      - SPARK_EXECUTOR_MEMORY=512m
    volumes:
      - ../spark_apps:/opt/spark/spark_apps
    depends_on:
      - minio
      - clickhouse
    command: tail -f /dev/null

  airflow-init:
    image: apache/airflow:2.9.2
    container_name: banking-airflow-init
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - airflow_data:/opt/airflow
    command: >
      bash -c "
      airflow db init &&
      airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@example.com
      "

  airflow-webserver:
    image: apache/airflow:2.9.2
    container_name: banking-airflow-webserver
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _PIP_ADDITIONAL_REQUIREMENTS=docker sqlalchemy pymongo psycopg2-binary
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    volumes:
      - ../dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
      - airflow_data:/opt/airflow
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.9.2
    container_name: banking-airflow-scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _PIP_ADDITIONAL_REQUIREMENTS=docker sqlalchemy pymongo psycopg2-binary
    volumes:
      - ../dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
      - airflow_data:/opt/airflow
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler

volumes:
  postgres_data:
  mongo_data:
  clickhouse_data:
  minio_data:
  airflow_data:
