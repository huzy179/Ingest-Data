services:

  postgres:
    image: postgres:17
    container_name: banking-postgres

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: banking_core

    ports:
      - "5434:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  mongo:
    image: mongo:8
    container_name: banking-mongo

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db


volumes:
  postgres_data:
  mongo_data:
